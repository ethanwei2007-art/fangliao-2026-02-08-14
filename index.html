<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枋寮志工：極簡無限回憶</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-radius: 24px; /* Apple 風格大圓角 */
            --text-color: rgba(255, 255, 255, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1c1c1e 0%, #0a0a0c 100%);
            overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: none;
        }

        /* 宇宙主舞台 */
        #universe {
            position: absolute;
            width: 100%; height: 100%;
            will-change: transform;
        }

        .photo-card {
            position: absolute;
            width: 200px; /* 照片大小 */
            height: 200px;
            display: block;
            text-decoration: none;
        }

        .photo-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: var(--card-radius);
            border: 0.5px solid rgba(255, 255, 255, 0.2); /* 極細邊框 */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s ease;
        }

        /* 滑鼠經過：極簡放大感 */
        .photo-card:hover img {
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* UI 設計 */
        .header {
            position: fixed; top: 40px; left: 40px; z-index: 100;
            color: var(--text-color); pointer-events: none;
        }
        .header h1 { margin: 0; font-size: 1.2rem; font-weight: 500; letter-spacing: 2px; opacity: 0.8; }
        
        .footer-hint {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); font-size: 0.8rem; letter-spacing: 1px;
            z-index: 100; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>枋寮志工活動錄</h1>
</div>

<div class="footer-hint">任意方向拖拽 ‧ 無限探索</div>

<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const totalPhotos = 100;

    // --- 無限宇宙設定 ---
    const cols = 10;
    const rows = 10;
    const cellSize = 500; // 每個格子的寬高，加大間距避免亂
    const worldWidth = cols * cellSize;
    const worldHeight = rows * cellSize;

    const photos = [];

    // 1. 初始化照片位置 (擾動網格)
    let count = 1;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (count > totalPhotos) break;

            const a = document.createElement('a');
            a.href = `fangliao (${count}).jpg`;
            a.className = 'photo-card';
            
            // 在格子內隨機偏移，但保證不超出格子避免重疊
            const offsetX = (Math.random() - 0.5) * 200; 
            const offsetY = (Math.random() - 0.5) * 200;
            
            const x = c * cellSize + offsetX;
            const y = r * cellSize + offsetY;

            a.style.left = x + 'px';
            a.style.top = y + 'px';

            const img = document.createElement('img');
            img.src = `fangliao (${count}).jpg`;
            img.loading = "lazy";
            
            a.appendChild(img);
            universe.appendChild(a);
            
            photos.push({ element: a, x: x, y: y });
            count++;
        }
    }

    // 2. 無限循環與拖曳邏輯
    let viewX = 0, viewY = 0; // 當前視角位置
    let isDragging = false;
    let lastMouseX = 0, lastMouseY = 0;
    let velX = 0, velY = 0; // 增加慣性運動

    function update() {
        // 慣性摩擦力
        if (!isDragging) {
            viewX += velX;
            viewY += velY;
            velX *= 0.95;
            velY *= 0.95;
        }

        // 核心邏輯：計算每張照片在「無限循環」下的相對位置
        photos.forEach(p => {
            // 使用 Modulo (取餘數) 實現無限包裹
            let displayX = (p.x + viewX) % worldWidth;
            let displayY = (p.y + viewY) % worldHeight;

            // 確保座標永遠是正數
            if (displayX < 0) displayX += worldWidth;
            if (displayY < 0) displayY += worldHeight;

            // 讓照片以畫面中心為基準分佈
            p.element.style.transform = `translate3d(${displayX - 200}px, ${displayY - 200}px, 0)`;
        });

        requestAnimationFrame(update);
    }
    update();

    // 3. 事件監聽 (支援滑鼠與觸控)
    function onStart(e) {
        if (e.target.tagName === 'IMG') return;
        isDragging = true;
        const pageX = e.pageX || e.touches[0].pageX;
        const pageY = e.pageY || e.touches[0].pageY;
        lastMouseX = pageX;
        lastMouseY = pageY;
    }

    function onMove(e) {
        if (!isDragging) return;
        const pageX = e.pageX || e.touches[0].pageX;
        const pageY = e.pageY || e.touches[0].pageY;
        
        const dx = pageX - lastMouseX;
        const dy = pageY - lastMouseY;
        
        viewX += dx;
        viewY += dy;
        velX = dx; // 記錄速度用於慣性
        velY = dy;

        lastMouseX = pageX;
        lastMouseY = pageY;
    }

    function onEnd() {
        isDragging = false;
    }

    window.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchstart', onStart);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('touchend', onEnd);

    // 啟動點擊放大
    window.addEventListener('load', () => baguetteBox.run('#universe'));
</script>
</body>
</html>
