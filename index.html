<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枋寮回憶：沈浸式星空</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { --bg-color-1: #0a0a12; --bg-color-2: #140d1a; --card-radius: 20px; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2));
            background-size: 400% 400%; animation: gradientBG 20s ease infinite;
            overflow: hidden; font-family: 'Inter', sans-serif;
        }

        /* --- 啟動開場層 (Apple Style) --- */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1), visibility 2s;
        }
        #start-overlay.fade-out { opacity: 0; visibility: hidden; }
        
        #start-btn {
            background: none; border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 15px 40px; border-radius: 40px;
            font-size: 0.9rem; letter-spacing: 4px; cursor: pointer;
            transition: all 0.5s; backdrop-filter: blur(10px);
        }
        #start-btn:hover { background: white; color: black; border-color: white; transform: scale(1.05); }

        /* 其餘樣式承襲 4.0 版 */
        #cursor-glow {
            position: fixed; top: 0; left: 0; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; pointer-events: none; z-index: 0; transform: translate(-50%, -50%);
        }
        #universe { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .photo-card { position: absolute; width: 230px; height: 230px; will-change: transform; opacity: 0; }
        .photo-card.reveal { opacity: 1; transition: opacity 2.5s ease; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--card-radius); box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 0.5px solid rgba(255,255,255,0.1); transition: transform 0.4s ease; }
        .header { position: fixed; top: 40px; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; opacity: 0; transition: 3s; }
        .header.reveal { opacity: 0.8; }
        @keyframes gradientBG { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn">進入枋寮回憶星空</button>
</div>

<div id="cursor-glow"></div>
<div class="header" id="header"><h1>枋寮志工活動錄</h1></div>
<audio id="bgm" src="music.mp3" loop></audio>
<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const overlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const bgm = document.getElementById('bgm');
    const header = document.getElementById('header');
    const glow = document.getElementById('cursor-glow');

    // --- 啟動儀式 ---
    startBtn.addEventListener('click', () => {
        // 1. 播放音樂並設定倍速
        bgm.playbackRate = 0.85; 
        bgm.play();
        
        // 2. 隱藏開場層
        overlay.classList.add('fade-out');
        
        // 3. 觸發標題與照片動畫
        header.classList.add('reveal');
        photos.forEach((p, index) => {
            setTimeout(() => p.element.classList.add('reveal'), index * 15);
        });
    });

    // 背景互動
    window.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    // 照片牆初始化 (維持 3.5 版)
    const totalPhotos = 100;
    const cellSize = 380; 
    const worldWidth = 10 * cellSize;
    const worldHeight = 10 * cellSize;
    const photos = [];

    for (let i = 1; i <= totalPhotos; i++) {
        const a = document.createElement('a');
        a.href = `fangliao (${i}).jpg`;
        a.className = 'photo-card';
        const x = ((i - 1) % 10) * cellSize + (Math.random()-0.5)*80;
        const y = Math.floor((i - 1) / 10) * cellSize + (Math.random()-0.5)*80;
        const img = document.createElement('img');
        img.src = `fangliao (${i}).jpg`;
        img.loading = "lazy";
        a.appendChild(img);
        universe.appendChild(a);
        photos.push({ element: a, x, y });
    }

    let viewX = 0, viewY = 0, velX = 0.5, velY = 0.3, isDragging = false, lastX, lastY;

    function render() {
        if (!isDragging) { viewX += velX; viewY += velY; velX *= 0.98; velY *= 0.98; }
        const winW = window.innerWidth, winH = window.innerHeight;
        photos.forEach(p => {
            let sx = (p.x + viewX) % worldWidth;
            let sy = (p.y + viewY) % worldHeight;
            if (sx < 0) sx += worldWidth; if (sy < 0) sy += worldHeight;
            p.element.style.transform = `translate3d(${sx - worldWidth/2 + winW/2}px, ${sy - worldHeight/2 + winH/2}px, 0)`;
        });
        requestAnimationFrame(render);
    }
    render();

    const start = e => { if(e.target.tagName !== 'IMG') { isDragging = true; lastX = e.pageX || e.touches[0].pageX; lastY = e.pageY || e.touches[0].pageY; }};
    const move = e => { if(!isDragging) return; const x = e.pageX || e.touches[0].pageX, y = e.pageY || e.touches[0].pageY; const dx = x - lastX, dy = y - lastY; viewX += dx; viewY += dy; velX = dx; velY = dy; lastX = x; lastY = y; };
    window.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchstart', start); window.addEventListener('touchmove', move); window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('load', () => baguetteBox.run('#universe'));
</script>
</body>
</html>
