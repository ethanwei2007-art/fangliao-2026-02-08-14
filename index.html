<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>枋寮回憶：無限星空</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { 
            --bg-1: #080a15; 
            --bg-2: #120818; 
            /* 手機卡片縮小一點，電腦維持大小，解決image_1太空礦的問題 */
            --card-w: clamp(160px, 40vw, 240px);
            --card-radius: 20px; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            /* 沈浸式深邃漸變背景 */
            background: linear-gradient(45deg, var(--bg-1), var(--bg-2));
            background-size: 300% 300%; 
            animation: gradientBG 10s ease infinite; /* 縮短到 10 秒，讓變色更有感 */
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif;
            touch-action: none; /* 禁用系統預設滾動，全心探索宇宙 */
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 宇宙主舞台 */
        #universe { position: absolute; width: 100%; height: 100%; z-index: 1; perspective: 1500px; }

        /* 照片卡片基礎樣式 */
        .photo-card { 
            position: absolute; width: var(--card-w); height: var(--card-w); opacity: 0; 
            will-change: transform; cursor: pointer;
        }
        .photo-card.reveal { opacity: 1; transition: opacity 1.5s ease; }
        
        .card-front-thumb { 
            width: 100%; height: 100%; object-fit: cover; border-radius: var(--card-radius); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 0.5px solid rgba(255,255,255,0.1); 
            filter: brightness(0.85);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.4s ease;
        }

        /* 滑鼠經過效果：微微浮起，質感高級 */
        .photo-card:hover .card-front-thumb { 
            filter: brightness(1); 
            transform: scale(1.05); 
            border-color: rgba(255,255,255,0.4); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* --- 【重點：baguetteBox 手機大圖修復】 --- */
        #baguetteBox-overlay .full-image img {
            max-width: 100% !important;
            max-height: 100% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain !important; /* 確保整張圖片縮放在框框內，不切掉也不撐破 */
        }
        
        /* 修正圖片容器，防止出現左右滾動條，完美自適應螢幕 */
        #baguetteBox-overlay .full-image {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        /* --- 其他手機問題修復 --- */
        /* 針對手機加大按鈕和標題 */
        #start-btn { 
            padding: clamp(15px, 5vw, 25px) clamp(30px, 10vw, 60px); 
            font-size: clamp(1rem, 4vw, 1.4rem); 
        }
        .header h1 { 
            font-size: clamp(1.4rem, 6vw, 2.2rem); 
        }

        /* 針對手機優化彩蛋大圖自適應 */
        .secret-front img {
            max-width: 100% !important;
            max-height: 100% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain !important; /* 確保整張彩蛋圖片縮放在框框內，不切掉 */
        }

        /* --- 沈浸式大圖彩蛋覆蓋層 CSS (手機雙擊/長按翻轉) --- */
        #secret-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.5s; perspective: 1500px;
        }
        #secret-overlay.open { opacity: 1; visibility: visible; }
        
        /* 叉叉按鈕 */
        .close-secret { position: absolute; top: 20px; right: 20px; color: white; font-size: 3rem; cursor: pointer; font-weight: 300; z-index: 10001; }

        /* 彩蛋卡片樣式 */
        .secret-card-container { width: 85vw; max-width: 400px; aspect-ratio: 1/1; cursor: pointer; perspective: 2000px; }
        .secret-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .secret-card-container.flipped .secret-card-inner { transform: rotateY(180deg); }

        .secret-front, .secret-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: var(--card-radius); overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border: 0.5px solid rgba(255,255,255,0.1); }
        .secret-front img { width: 100%; height: 100%; object-fit: cover; }

        /* 卡片背面設計：暖色調文字卡片 */
        .secret-back {
            background: #fffdf5; transform: rotateY(180deg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; box-sizing: border-box; color: #3d2b1f; text-align: center;
        }
        .secret-back p { font-family: 'Noto Serif TC', serif; font-size: 1rem; line-height: 1.8; margin: 0; word-break: break-all; }
        .secret-signature { margin-top: 20px; font-size: 0.75rem; color: #8d6e63; font-weight: bold; }

        /* 其餘 UI 樣式 (承襲 4.2 版) */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 1s; }
        #start-overlay.fade-out { opacity: 0; visibility: hidden; }
        #start-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 50px; letter-spacing: 5px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.5s; }
        #start-btn:hover { background: white; color: black; border-color: white; transform: scale(1.05); }

        .header { position: fixed; top: 6%; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; opacity: 0; transition: 3s; }
        .header.reveal { opacity: 0.8; }
        .header h1 { font-weight: 300; letter-spacing: 5px; margin: 0; }
        
        #cursor-glow { position: fixed; top: 0; left: 0; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; pointer-events: none; z-index: 0; transform: translate(-50%, -50%); }

        /* baguetteBox：刪除左右導覽箭頭，保留叉叉 */
        #previous-button, #next-button { display: none !important; }
    </style>
</head>
<body>

<div id="start-overlay"><button id="start-btn">進入枋寮回憶星空</button></div>

<div id="secret-overlay">
    <div class="close-secret" id="close-secret-btn">&times;</div>
    <div class="secret-card-container" id="secret-card">
        <div class="secret-card-inner">
            <div class="secret-front">
                <img src="fangliao (16).jpg">
                <div style="position:absolute; bottom:15px; width:100%; text-align:center; color:white; font-size:0.8rem; opacity:0.8; text-shadow: 0 2px 4px #000;">✨ 長按或雙擊翻轉卡片</div>
            </div>
            <div class="secret-back">
                <p>嘿嘿被你們發現了！<br>營隊結束了，<br>希望你們還記得我們。<br>台北等你們喔！！</p>
                <div class="secret-signature">By: 小毅 (這個網頁是我做的喔!)</div>
            </div>
        </div>
    </div>
</div>

<div id="cursor-glow"></div>
<div class="header" id="header"><h1>枋寮志工活動錄</h1></div>
<audio id="bgm" src="music.mp3" loop></audio>
<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const bgm = document.getElementById('bgm');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('start-overlay');
    const header = document.getElementById('header');
    const glow = document.getElementById('cursor-glow');

    // 彩蛋相關
    const secretOverlay = document.getElementById('secret-overlay');
    const secretCard = document.getElementById('secret-card');
    const closeSecretBtn = document.getElementById('close-secret-btn');

    const totalPhotos = 100;
    const cellSize = isMobile ? 220 : 420; 
    const worldWidth = cols * cellSize;
    const worldHeight = Math.ceil(totalPhotos / cols) * cellSize;
    const photos = [];

    // --- 產生宇宙中的星星照片 ---
    for (let i = 1; i <= totalPhotos; i++) {
        // 如果是第 16 張，我們不用 a 標籤包裹，以免觸發 baguetteBox
        if (i === 16) {
            const card = document.createElement('div');
            card.className = 'photo-card xiao-yi-secret'; // 加上一個專屬類名
            const img = document.createElement('img');
            img.src = `fangliao (${i}).jpg`;
            img.loading = "lazy";
            img.className = 'card-front-thumb';
            card.appendChild(img);
            
            // 第 16 張的點擊邏輯：開啟專屬大圖覆蓋層
            card.addEventListener('click', () => {
                secretOverlay.classList.add('open');
                secretCard.classList.remove('flipped'); // 每次打開保證是正面
            });
            
            universe.appendChild(card);
            
            const x = ((i - 1) % cols) * cellSize + (Math.random()-0.5)*80;
            const y = Math.floor((i - 1) / cols) * cellSize + (Math.random()-0.5)*80;
            photos.push({ element: card, x, y });

        } else {
            // 其餘照片維持 baguetteBox 邏輯
            const a = document.createElement('a');
            a.href = `fangliao (${i}).jpg`;
            a.className = 'photo-card';
            const img = document.createElement('img');
            img.src = `fangliao (${i}).jpg`;
            img.loading = "lazy";
            img.className = 'card-front-thumb';
            a.appendChild(img);
            universe.appendChild(a);
            
            const x = ((i - 1) % cols) * cellSize + (Math.random()-0.5)*80;
            const y = Math.floor((i - 1) / cols) * cellSize + (Math.random()-0.5)*80;
            photos.push({ element: a, x, y });
        }
    }

    // --- 彩蛋覆蓋層內的操作邏輯 ---
    // 1. 叉叉按鈕關閉
    closeSecretBtn.addEventListener('click', () => secretOverlay.classList.remove('open'));
    // 2. 點擊覆蓋層空白處關閉
    secretOverlay.addEventListener('click', (e) => {
        if (e.target === secretOverlay) secretOverlay.classList.remove('open');
    });

    // 3. 處理翻轉：相容手機與電腦 (長按或雙擊)
    let touchStartTime = 0;
    
    function toggleFlip(e) {
        e.stopPropagation();
        secretCard.classList.toggle('flipped');
    }

    // 觸控長按偵測
    secretCard.addEventListener('touchstart', (e) => {
        touchStartTime = Date.now();
        if (e.touches.length > 1) return; // 忽略多指
    });
    secretCard.addEventListener('touchend', (e) => {
        const touchEndTime = Date.now();
        const duration = touchEndTime - touchStartTime;
        if (duration > 500) { // 長按超過 0.5 秒
            toggleFlip(e);
        }
    });

    // 電腦雙擊偵測
    secretCard.addEventListener('dblclick', toggleFlip);

    // --- 其餘核心邏輯 (承襲 4.2 版) ---
    // 啟動儀式：音樂、動畫同步啟動
    startBtn.addEventListener('click', () => {
        bgm.playbackRate = 0.85; bgm.play();
        overlay.classList.add('fade-out');
        header.classList.add('reveal');
        photos.forEach((p, index) => setTimeout(() => p.element.classList.add('reveal'), index * 10));
    });

    // 背景滑鼠追蹤 (電腦版)
    window.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    // 沈浸式物理滾動邏輯 (慣性 + 循環)
    let viewX = 0, viewY = 0, velX = 0.3, velY = 0.2, isDragging = false, lastX, lastY;

    function render() {
        if (!isDragging) { viewX += velX; viewY += velY; velX *= 0.98; velY *= 0.98; }
        const winW = window.innerWidth, winH = window.innerHeight;
        photos.forEach(p => {
            let sx = (p.x + viewX) % worldWidth;
            let sy = (p.y + viewY) % worldHeight;
            if (sx < 0) sx += worldWidth; if (sy < 0) sy += worldHeight;
            p.element.style.transform = `translate3d(${sx - worldWidth/2 + winW/2}px, ${sy - worldHeight/2 + winH/2}px, 0)`;
        });
        requestAnimationFrame(render);
    }
    render();

    // 互動事件 (滑鼠 & 觸控)
    const startDrag = e => { if(e.target.className !== 'card-front-thumb') { isDragging = true; lastX = e.pageX || e.touches[0].pageX; lastY = e.pageY || e.touches[0].pageY; }};
    const moveDrag = e => { if(!isDragging) return; const x = e.pageX || e.touches[0].pageX, y = e.pageY || e.touches[0].pageY; const dx = x - lastX, dy = y - lastY; viewX += dx; viewY += dy; velX = dx; velY = dy; lastX = x; lastY = y; };
    
    window.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', moveDrag); window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchstart', startDrag, {passive: false}); window.addEventListener('touchmove', moveDrag, {passive: false}); window.addEventListener('touchend', () => isDragging = false);
    
    // 啟動 baguetteBox (自動處理放大效果)
    window.addEventListener('load', () => baguetteBox.run('#universe'));
</script>
</body>
</html>
