<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枋寮回憶：極簡無限星空 3.4</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { --bg-color: #08080a; --card-radius: 16px; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); overflow: hidden; 
            font-family: 'Inter', sans-serif; touch-action: none;
        }

        #universe { position: absolute; width: 100%; height: 100%; }

        .photo-card {
            position: absolute; width: 240px; height: 240px;
            /* 移除這裡的 transition 以免造成循環時的飛越殘影 */
            will-change: transform;
            opacity: 0; /* 初始透明供開場動畫使用 */
        }

        /* 只有開場跟消失時需要淡入感 */
        .photo-card.reveal { opacity: 1; transition: opacity 1.5s ease; }

        .photo-card img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: var(--card-radius);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            /* 縮放動畫只留在圖片本身 */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Apple 風格懸停：微微浮起 */
        .photo-card:hover img { 
            transform: scale(1.06); 
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .header {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; z-index: 100; pointer-events: none;
        }
        .header h1 { font-weight: 300; letter-spacing: 6px; opacity: 0; transform: translateY(10px); transition: 2s; }
        .header.reveal h1 { opacity: 0.8; transform: translateY(0); }
    </style>
</head>
<body>

<div class="header" id="header">
    <h1>枋寮志工活動錄</h1>
</div>

<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const totalPhotos = 100;

    // --- 密度設定 ---
    const cellSize = 380; // 縮小間距（原本 550），讓照片更密集
    const cols = 10;
    const rows = 10;
    const worldWidth = cols * cellSize;
    const worldHeight = rows * cellSize;
    const photos = [];

    // 1. 初始化照片
    for (let i = 1; i <= totalPhotos; i++) {
        const a = document.createElement('a');
        a.href = `fangliao (${i}).jpg`;
        a.className = 'photo-card';
        
        // 擾動網格：在 380px 的格子內隨機偏移，確保不重疊
        const baseX = ((i - 1) % cols) * cellSize;
        const baseY = Math.floor((i - 1) / cols) * cellSize;
        const x = baseX + (Math.random() - 0.5) * 80;
        const y = baseY + (Math.random() - 0.5) * 80;

        const img = document.createElement('img');
        img.src = `fangliao (${i}).jpg`;
        img.loading = "lazy";
        
        a.appendChild(img);
        universe.appendChild(a);
        photos.push({ element: a, x, y });
    }

    // 2. 物理與循環邏輯
    let viewX = 0, viewY = 0, velX = 0, velY = 0, isDragging = false;
    let lastX, lastY;

    function render() {
        if (!isDragging) {
            viewX += velX; viewY += velY;
            velX *= 0.95; velY *= 0.95;
        }

        const winW = window.innerWidth;
        const winH = window.innerHeight;

        photos.forEach(p => {
            // 無限循環計算
            let screenX = (p.x + viewX) % worldWidth;
            let screenY = (p.y + viewY) % worldHeight;
            if (screenX < 0) screenX += worldWidth;
            if (screenY < 0) screenY += worldHeight;

            // 讓坐標以螢幕中心擴散
            p.element.style.transform = `translate3d(${screenX - (worldWidth/2) + (winW/2)}px, ${screenY - (worldHeight/2) + (winH/2)}px, 0)`;
        });
        requestAnimationFrame(render);
    }
    render();

    // 3. 開場動畫：從中心擴散飛出
    window.addEventListener('load', () => {
        document.getElementById('header').classList.add('reveal');
        // 初始化時先隨機給點速度，讓它動起來
        velX = 1; velY = 0.5;
        
        photos.forEach((p, index) => {
            setTimeout(() => {
                p.element.classList.add('reveal');
            }, index * 15);
        });
        baguetteBox.run('#universe');
    });

    // 4. 互動事件
    const startDrag = (e) => {
        if(e.target.tagName === 'IMG') return;
        isDragging = true;
        lastX = e.pageX || e.touches[0].pageX;
        lastY = e.pageY || e.touches[0].pageY;
    };

    const moveDrag = (e) => {
        if (!isDragging) return;
        const x = e.pageX || e.touches[0].pageX;
        const y = e.pageY || e.touches[0].pageY;
        const dx = x - lastX;
        const dy = y - lastY;
        viewX += dx; viewY += dy;
        velX = dx; velY = dy;
        lastX = x; lastY = y;
    };

    window.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', moveDrag);
    window.addEventListener('touchend', () => isDragging = false);
</script>
</body>
</html>
