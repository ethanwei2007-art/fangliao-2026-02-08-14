<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枋寮志工：沈浸式回憶星空</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { --primary-glow: rgba(255, 255, 255, 0.3); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050810; overflow: hidden; font-family: 'Noto Sans TC', sans-serif;
            touch-action: none;
        }

        /* --- CSS 設計：閃爍星空背景 --- */
        #star-container { position: fixed; width: 100%; height: 100%; z-index: 0; }
        .bg-star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 宇宙主容器 */
        #universe {
            position: absolute; top: 0; left: 0; will-change: transform; z-index: 1;
        }

        .star-link {
            position: absolute; display: block; width: 140px; height: 140px;
            transform: translate(-50%, -50%); transition: filter 0.3s;
        }

        .star-photo {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px var(--primary-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .star-photo:hover {
            transform: scale(1.25); border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            z-index: 100;
        }

        /* --- UI 設計 --- */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }
        .header {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; pointer-events: none;
        }
        .header h1 { margin: 0; font-weight: 500; letter-spacing: 4px; font-size: 1.8rem; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .header p { font-weight: 300; opacity: 0.7; font-size: 0.9rem; margin-top: 5px; }

        #reset-btn {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 10px 20px; border-radius: 30px;
            cursor: pointer; pointer-events: auto; backdrop-filter: blur(5px);
            transition: 0.3s; font-size: 0.8rem;
        }
        #reset-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
    </style>
