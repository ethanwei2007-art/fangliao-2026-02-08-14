<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枋寮回憶：無限星空</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { --bg-color: #050505; --card-radius: 20px; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif;
            touch-action: none;
        }

        /* 宇宙容器 */
        #universe { position: absolute; width: 100%; height: 100%; will-change: transform; }

        /* 照片卡片基礎樣式 */
        .photo-card {
            position: absolute; width: 220px; height: 220px;
            /* 初始狀態：縮小且透明，準備做開場動畫 */
            opacity: 0; transform: translate(-50%, -50%) scale(0.5);
            transition: opacity 1s ease-out, transform 1s cubic-bezier(0.2, 0.8, 0.2, 1.1);
        }

        /* 開場後的狀態 */
        .photo-card.reveal { opacity: 1; }

        .photo-card img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: var(--card-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 0.5px solid rgba(255,255,255,0.15);
            transition: transform 0.4s ease;
        }

        .photo-card:hover img { transform: scale(1.05); border-color: rgba(255,255,255,0.5); }

        /* UI 元素 */
        .header {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; z-index: 100; pointer-events: none;
        }
        .header h1 { font-weight: 300; letter-spacing: 5px; opacity: 0; transition: 2s; }
        .header.reveal h1 { opacity: 1; }
    </style>
</head>
<body>

<div class="header" id="header">
    <h1>枋寮回憶錄</h1>
</div>

<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const totalPhotos = 100;
    const cellSize = 550; 
    const worldWidth = 10 * cellSize;
    const worldHeight = 10 * cellSize;
    const photos = [];

    // 1. 產生照片
    for (let i = 1; i <= totalPhotos; i++) {
        const a = document.createElement('a');
        a.href = `fangliao (${i}).jpg`;
        a.className = 'photo-card';
        
        // 隨機初始位置
        const x = (i % 10) * cellSize + (Math.random()-0.5)*200;
        const y = Math.floor(i / 10) * cellSize + (Math.random()-0.5)*200;

        const img = document.createElement('img');
        img.src = `fangliao (${i}).jpg`;
        img.loading = "lazy";
        
        a.appendChild(img);
        universe.appendChild(a);
        photos.push({ element: a, x, y });
    }

    // 2. 無限循環滾動邏輯
    let viewX = 0, viewY = 0, velX = 0, velY = 0, isDragging = false;
    let lastX, lastY;

    function render() {
        if (!isDragging) { viewX += velX; viewY += velY; velX *= 0.95; velY *= 0.95; }
        photos.forEach(p => {
            let dx = (p.x + viewX) % worldWidth;
            let dy = (p.y + viewY) % worldHeight;
            if (dx < 0) dx += worldWidth; if (dy < 0) dy += worldHeight;
            // 只有在已經「揭曉」後才套用位移 transform
            if (p.element.classList.contains('reveal')) {
                p.element.style.transform = `translate3d(${dx - 220}px, ${dy - 220}px, 0)`;
            }
        });
        requestAnimationFrame(render);
    }
    render();

    // 3. 【開場動畫控制】
    window.addEventListener('load', () => {
        document.getElementById('header').classList.add('reveal');
        photos.forEach((p, index) => {
            // 每張照片稍微延遲一點點，創造「噴發」感
            setTimeout(() => {
                p.element.classList.add('reveal');
            }, index * 20); 
        });
        baguetteBox.run('#universe');
    });

    // 4. 互動事件 (省略部分重複邏輯以求簡潔，功能維持 3.2 版)
    window.addEventListener('mousedown', e => { if(e.target.tagName !== 'IMG') { isDragging = true; lastX = e.pageX; lastY = e.pageY; }});
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const dx = e.pageX - lastX; const dy = e.pageY - lastY;
        viewX += dx; viewY += dy; velX = dx; velY = dy; lastX = e.pageX; lastY = e.pageY;
    });
    window.addEventListener('mouseup', () => isDragging = false);
</script>
</body>
</html>
