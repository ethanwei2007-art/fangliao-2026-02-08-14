<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>枋寮回憶：無限星空 5.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { 
            --bg-1: #080a15; --bg-2: #120818; 
            --card-w: clamp(180px, 45vw, 250px);
            --card-radius: 20px; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: linear-gradient(45deg, var(--bg-1), var(--bg-2));
            background-size: 300% 300%; animation: gradientBG 12s ease infinite;
            overflow: hidden; font-family: 'Inter', -apple-system, sans-serif;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        #universe { position: absolute; width: 100%; height: 100%; z-index: 1; perspective: 1500px; }

        .photo-card { 
            position: absolute; width: var(--card-w); height: var(--card-w); opacity: 0; 
            will-change: transform; cursor: pointer;
        }
        .photo-card.reveal { opacity: 1; transition: opacity 1.5s ease; }
        
        .card-front-thumb { 
            width: 100%; height: 100%; object-fit: cover; border-radius: var(--card-radius); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 0.5px solid rgba(255,255,255,0.1); 
            filter: brightness(0.85);
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        /* --- 啟動層：按鈕與標題優化 --- */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 1s; }
        #start-overlay.fade-out { opacity: 0; visibility: hidden; }
        
        #start-btn { 
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.6); 
            color: white; padding: 20px 50px; border-radius: 50px; 
            font-size: 1.4rem; letter-spacing: 5px; cursor: pointer; backdrop-filter: blur(15px);
        }

        .header { position: fixed; top: 6%; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; opacity: 0; transition: 3s; }
        .header.reveal { opacity: 0.8; }
        .header h1 { font-size: 1.6rem; letter-spacing: 6px; }

        /* --- 彩蛋覆蓋層：核心修正區 --- */
        #secret-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.96); z-index: 10000; 
            display: flex; justify-content: center; align-items: center; 
            opacity: 0; visibility: hidden; transition: 0.5s; 
        }
        #secret-overlay.open { opacity: 1; visibility: visible; }
        
        .secret-card-container { 
            width: 85%; max-width: 400px; aspect-ratio: 1/1; 
            perspective: 2000px; /* 給予足夠的透視深度 */
        }
        
        .secret-card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; /* 確保子元素在 3D 空間 */
        }
        
        /* 翻轉觸發 */
        .secret-card-container.flipped .secret-card-inner { transform: rotateY(180deg); }

        .secret-front, .secret-back { 
            position: absolute; width: 100%; height: 100%; 
            /* 修正關鍵：同時加上 -webkit 字首 */
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden; 
            border-radius: var(--card-radius); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .secret-front { z-index: 2; transform: rotateY(0deg); }
        .secret-front img { width: 100%; height: 100%; object-fit: cover; }

        .secret-back { 
            background: #fffdf5; /* 必須是不透明色 */
            z-index: 1; 
            transform: rotateY(180deg); /* 預先背對 */
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 30px; box-sizing: border-box; color: #3d2b1f; text-align: center; 
        }
        
        .secret-back p { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; line-height: 2; margin: 0; }
        .close-secret { position: absolute; top: 30px; right: 30px; color: white; font-size: 3rem; cursor: pointer; z-index: 10001; }

        /* 移除導覽箭頭 */
        #previous-button, #next-button { display: none !important; }
        
        @keyframes gradientBG { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    </style>
</head>
<body>

<div id="start-overlay"><button id="start-btn">進入枋寮回憶星空</button></div>

<div id="secret-overlay">
    <div class="close-secret" id="close-secret-btn">&times;</div>
    <div class="secret-card-container" id="secret-card">
        <div class="secret-card-inner">
            <div class="secret-front">
                <img src="fangliao (16).jpg">
                <div style="position:absolute; bottom:20px; width:100%; text-align:center; color:white; font-size:0.9rem; opacity:0.8;">✨ 長按或雙擊翻轉</div>
            </div>
            <div class="secret-back">
                <p>嘿嘿被你們發現了！<br>營隊結束了，<br>希望你們還記得我們。<br>台北等你們喔！！</p>
                <div style="margin-top:25px; font-size:0.8rem; color:#8d6e63; font-weight: bold;">By: 小毅 (這個網頁是我做的喔!)</div>
            </div>
        </div>
    </div>
</div>

<div id="header" class="header"><h1>枋寮志工活動錄</h1></div>
<audio id="bgm" src="music.mp3" loop></audio>
<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const bgm = document.getElementById('bgm');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('start-overlay');
    const header = document.getElementById('header');
    const secretCard = document.getElementById('secret-card');
    const secretOverlay = document.getElementById('secret-overlay');

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const totalPhotos = 100;
    const cellSize = isMobile ? 240 : 420; 
    const cols = 10;
    const worldWidth = cols * cellSize;
    const worldHeight = Math.ceil(totalPhotos / cols) * cellSize;
    const photos = [];

    for (let i = 1; i <= totalPhotos; i++) {
        const card = document.createElement(i === 16 ? 'div' : 'a');
        card.className = 'photo-card';
        if (i !== 16) card.href = `fangliao (${i}).jpg`;
        const img = document.createElement('img');
        img.src = `fangliao (${i}).jpg`;
        img.className = 'card-front-thumb';
        img.loading = "lazy";
        card.appendChild(img);
        universe.appendChild(card);
        const x = ((i - 1) % cols) * cellSize + (Math.random()-0.5)*50;
        const y = Math.floor((i - 1) / cols) * cellSize + (Math.random()-0.5)*50;
        photos.push({ element: card, x, y });
        if (i === 16) card.onclick = () => { secretOverlay.classList.add('open'); secretCard.classList.remove('flipped'); };
    }

    startBtn.onclick = () => {
        bgm.playbackRate = 0.85; bgm.play();
        overlay.classList.add('fade-out');
        header.classList.add('reveal');
        photos.forEach((p, index) => setTimeout(() => p.element.classList.add('reveal'), index * 8));
    };

    let viewX = 0, viewY = 0, velX = 0.2, velY = 0.1, isDragging = false, lastX, lastY;
    function render() {
        if (!isDragging) { viewX += velX; viewY += velY; velX *= 0.98; velY *= 0.98; }
        const winW = window.innerWidth, winH = window.innerHeight;
        photos.forEach(p => {
            let sx = (p.x + viewX) % worldWidth;
            let sy = (p.y + viewY) % worldHeight;
            if (sx < 0) sx += worldWidth; if (sy < 0) sy += worldHeight;
            p.element.style.transform = `translate3d(${sx - worldWidth/2 + winW/2}px, ${sy - worldHeight/2 + winH/2}px, 0)`;
        });
        requestAnimationFrame(render);
    }
    render();

    const start = e => { if(e.target.tagName !== 'IMG') { isDragging = true; lastX = e.pageX || e.touches[0].pageX; lastY = e.pageY || e.touches[0].pageY; }};
    const move = e => { if(!isDragging) return; const x = e.pageX || e.touches[0].pageX, y = e.pageY || e.touches[0].pageY; const dx = x - lastX, dy = y - lastY; viewX += dx; viewY += dy; velX = dx; velY = dy; lastX = x; lastY = y; };
    window.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchstart', start, {passive: false}); window.addEventListener('touchmove', move, {passive: false}); window.addEventListener('touchend', () => isDragging = false);
    
    let pressTimer;
    secretCard.addEventListener('touchstart', (e) => { e.preventDefault(); pressTimer = setTimeout(() => secretCard.classList.toggle('flipped'), 500); });
    secretCard.addEventListener('touchend', () => clearTimeout(pressTimer));
    secretCard.addEventListener('dblclick', () => secretCard.classList.toggle('flipped'));
    document.getElementById('close-secret-btn').onclick = () => secretOverlay.classList.remove('open');
    window.addEventListener('load', () => baguetteBox.run('#universe'));
</script>
</body>
</html>
