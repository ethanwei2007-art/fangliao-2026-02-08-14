<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枋寮回憶星空 3.1 Debug 版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050810; overflow: hidden; font-family: 'Noto Sans TC', sans-serif; }
        #universe { position: absolute; top: 0; left: 0; will-change: transform; }
        .star-link { position: absolute; display: block; width: 150px; height: 150px; transform: translate(-50%, -50%); }
        .star-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.5); transition: 0.3s; cursor: pointer; }
        .star-photo:hover { transform: scale(1.2); box-shadow: 0 0 20px #fff; z-index: 100; }
        
        /* UI 層 */
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; color: white; text-align: center; }
        .header { margin-top: 30px; }
        #debug-info { color: #ffeb3b; font-size: 0.8rem; margin-top: 10px; }
        #reset-btn { position: absolute; bottom: 30px; right: 30px; background: white; color: black; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; pointer-events: auto; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="header">
        <h1>🌌 枋寮回憶星空</h1>
        <div id="debug-info">正在偵測照片路徑...</div>
    </div>
    <button id="reset-btn">找不到照片？點我重設位置</button>
</div>

<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const debugInfo = document.getElementById('debug-info');
    
    // --- 【請再次確認你的照片總數與前綴】 ---
    const totalPhotos = 100; 
    const prefix = "fangliao"; // 如果你照片叫 photo (1)，這裡就要改 photo
    // ------------------------------------

    let loadedCount = 0;

    for (let i = 1; i <= totalPhotos; i++) {
        const a = document.createElement('a');
        // 自動偵測空格：這裡設定為 Windows 預設的 "名稱 (1).jpg"
        const fileName = `${prefix} (${i}).jpg`;
        a.href = fileName;
        a.className = 'star-link';

        // 分散範圍縮小一點 (2500x2500)，比較好找
        const x = (Math.random() * 2500) - 1250; 
        const y = (Math.random() * 2500) - 1250;
        a.style.left = x + 'px';
        a.style.top = y + 'px';

        const img = document.createElement('img');
        img.src = fileName;
        img.className = 'star-photo';
        
        // 偵測照片是否載入成功
        img.onload = () => {
            loadedCount++;
            debugInfo.innerText = `成功偵測到 ${loadedCount} 張回憶星球！(請按住滑鼠拖曳探索)`;
        };
        img.onerror = () => {
            if(i === 1) debugInfo.innerText = `⚠️ 找不到照片！請檢查檔名是否為 ${fileName}`;
        };

        a.appendChild(img);
        universe.appendChild(a);
    }

    // 拖曳邏輯
    let isDragging = false;
    let startX = 0, startY = 0;
    let transX = window.innerWidth / 2, transY = window.innerHeight / 2;
    let lastX = transX, lastY = transY;

    function update() { universe.style.transform = `translate3d(${transX}px, ${transY}px, 0)`; }
    update();

    window.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'IMG') return;
        isDragging = true;
        startX = e.pageX - lastX;
        startY = e.pageY - lastY;
        universe.style.transition = 'none';
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        transX = e.pageX - startX;
        transY = e.pageY - startY;
        requestAnimationFrame(update);
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        lastX = transX; lastY = transY;
    });

    document.getElementById('reset-btn').onclick = () => {
        transX = window.innerWidth / 2; transY = window.innerHeight / 2;
        lastX = transX; lastY = transY;
        universe.style.transition = 'transform 0.5s ease-out';
        update();
    };

    window.addEventListener('load', () => baguetteBox.run('#universe'));
</script>
</body>
</html>
