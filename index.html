<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枋寮回憶錄：無限宇宙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        :root { 
            --bg-1: #080a15; --bg-2: #180812; --bg-3: #081810; --bg-4: #151208;
            --card-radius: 20px; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: linear-gradient(45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4));
            background-size: 300% 300%; animation: gradientBG 10s ease infinite;
            overflow: hidden; font-family: 'Inter', sans-serif;
        }

        #universe { position: absolute; width: 100%; height: 100%; z-index: 1; perspective: 1200px; }

        /* --- 卡片結構 --- */
        .photo-card { position: absolute; width: 230px; height: 230px; opacity: 0; transform-style: preserve-3d; }
        .photo-card.reveal { opacity: 1; transition: opacity 2s ease; }
        
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .photo-card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: var(--card-radius); 
            overflow: hidden; box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 彩蛋提示 (隱藏在 Hover 中) --- */
        .hint-text {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.8); font-size: 0.7rem; letter-spacing: 2px;
            opacity: 0; transition: 0.5s; pointer-events: none;
        }
        .special-star:hover .hint-text { opacity: 1; }

        /* --- 卡片背面設計 --- */
        .card-back {
            background: #fffdf5; transform: rotateY(180deg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 25px; box-sizing: border-box; color: #3d2b1f; text-align: center;
        }
        .card-back p { 
            font-family: 'Noto Serif TC', serif; font-size: 0.95rem; 
            line-height: 1.8; margin: 0; word-break: break-all;
        }
        .back-sig { margin-top: 15px; font-size: 0.75rem; color: #8d6e63; opacity: 0.8; }

        /* UI 層與啟動層 (承襲 4.2 版) */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 1.5s; }
        #start-overlay.fade-out { opacity: 0; visibility: hidden; }
        #start-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 18px 50px; border-radius: 40px; letter-spacing: 5px; cursor: pointer; backdrop-filter: blur(10px); }
        .header { position: fixed; top: 40px; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; opacity: 0; transition: 3s; }
        .header.reveal { opacity: 0.8; }
        @keyframes gradientBG { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        #cursor-glow { position: fixed; top: 0; left: 0; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; pointer-events: none; z-index: 0; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="start-overlay"><button id="start-btn">進入枋寮回憶星空</button></div>
<div id="cursor-glow"></div>
<div class="header" id="header"><h1>枋寮志工活動錄</h1></div>
<audio id="bgm" src="music.mp3" loop></audio>
<div id="universe"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
<script>
    const universe = document.getElementById('universe');
    const bgm = document.getElementById('bgm');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('start-overlay');
    const header = document.getElementById('header');
    const glow = document.getElementById('cursor-glow');

    const totalPhotos = 100;
    const cellSize = 380; 
    const worldWidth = 10 * cellSize;
    const worldHeight = 10 * cellSize;
    const photos = [];

    // --- 產生照片與隱藏彩蛋 ---
    for (let i = 1; i <= totalPhotos; i++) {
        const card = document.createElement('div');
        card.className = i === 16 ? 'photo-card special-star' : 'photo-card';
        
        const inner = document.createElement('div');
        inner.className = 'card-inner';

        // 正面：包含照片連結
        const front = document.createElement('div');
        front.className = 'card-front';
        const a = document.createElement('a');
        a.href = `fangliao (${i}).jpg`;
        const img = document.createElement('img');
        img.src = `fangliao (${i}).jpg`;
        img.loading = "lazy";
        
        a.appendChild(img);
        front.appendChild(a);

        // 如果是第 16 張，加入微弱提示
        if (i === 16) {
            const hint = document.createElement('div');
            hint.className = 'hint-text';
            hint.innerText = "✨ 點擊邊緣翻轉";
            front.appendChild(hint);
        }

        inner.appendChild(front);

        // 第 16 張的背面：放上你的專屬文字
        if (i === 16) {
            const back = document.createElement('div');
            back.className = 'card-back';
            back.innerHTML = `
                <p>嘿嘿被你們發現了！<br>營隊結束了，<br>希望你們還記得我們。<br>台北等你們喔！！</p>
                <div class="back-sig">By: 小毅 (這個網頁是我做的喔!)</div>
            `;
            inner.appendChild(back);

            // 點擊卡片邊緣觸發翻轉，點擊中間依然是開大圖
            card.onclick = (e) => {
                if (e.target.tagName !== 'A' && e.target.tagName !== 'IMG') {
                    card.classList.toggle('flipped');
                }
            };
        }

        card.appendChild(inner);
        universe.appendChild(card);
        
        const x = ((i - 1) % 10) * cellSize + (Math.random()-0.5)*80;
        const y = Math.floor((i - 1) / 10) * cellSize + (Math.random()-0.5)*80;
        photos.push({ element: card, x, y });
    }

    // 啟動邏輯
    startBtn.addEventListener('click', () => {
        bgm.playbackRate = 0.85; bgm.play();
        overlay.classList.add('fade-out');
        header.classList.add('reveal');
        photos.forEach((p, index) => setTimeout(() => p.element.classList.add('reveal'), index * 12));
    });

    // 互動控制與渲染 (承襲 4.2 版)
    window.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    let viewX = 0, viewY = 0, velX = 0.3, velY = 0.2, isDragging = false, lastX, lastY;
    function render() {
        if (!isDragging) { viewX += velX; viewY += velY; velX *= 0.98; velY *= 0.98; }
        const winW = window.innerWidth, winH = window.innerHeight;
        photos.forEach(p => {
            let sx = (p.x + viewX) % worldWidth;
            let sy = (p.y + viewY) % worldHeight;
            if (sx < 0) sx += worldWidth; if (sy < 0) sy += worldHeight;
            p.element.style.transform = `translate3d(${sx - worldWidth/2 + winW/2}px, ${sy - worldHeight/2 + winH/2}px, 0)`;
        });
        requestAnimationFrame(render);
    }
    render();

    const start = e => { if(e.target.tagName !== 'IMG' && e.target.tagName !== 'A') { isDragging = true; lastX = e.pageX || e.touches[0].pageX; lastY = e.pageY || e.touches[0].pageY; }};
    const move = e => { if(!isDragging) return; const x = e.pageX || e.touches[0].pageX, y = e.pageY || e.touches[0].pageY; const dx = x - lastX, dy = y - lastY; viewX += dx; viewY += dy; velX = dx; velY = dy; lastX = x; lastY = y; };
    window.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchstart', start, {passive: false}); window.addEventListener('touchmove', move, {passive: false}); window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('load', () => baguetteBox.run('#universe'));
</script>
</body>
</html>
